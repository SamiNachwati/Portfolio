<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="my_styling.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <style>
        input {
            background-color: white;
            padding: 5px 30px;
            height: 50px;
            border-radius: 50px;
            border: 1px solid black;
        }

        input#submitButton {
            line-height: 0px; 
        }
        textarea{
            border-radius: 10px;
            padding: 10px 10px;
            line-height: 20px;
            height: 150px;
            border: 1px solid black;
        }
        label{
            text-align: center;
        }

        form{
            display: grid;
            grid-template-columns: auto auto;
            justify-items: center;
            gap: 20px
        }
        form div:nth-child(3), form div:nth-child(4) {
            grid-column: 1 / span 2;
            justify-self: stretch;
        }

        form div:nth-child(5){
            grid-column: 1 / 3;
        }

        form div{
            display: flex;
            padding-bottom: 20px;
            justify-content: center;
            flex-flow: column wrap;
        }
        
        figure {
            display: flex;
            align-items: center;
            justify-items: center;
        }

        figure img {
            width: 100px;
            aspect-ratio: 3/2;
            object-fit: contain;
        }
        
        #secondHeading {
            padding: 30px 0;
        }

        @media (max-width: 968px){
            form{
                display: flex;
                flex-flow: column wrap;
            }
        }

        figure, p, input, label, div, figure a img, h1{
            animation: slideInUp 1.2s linear;
        }

        @keyframes slideInUp {
            from {
            transform: translateY(100%);
            }
        
            to {
            transform: translateY(0);
            }
        }
    </style>
</head>
<body id="bd">
    <nav>
        <ul id="name">
            <li>
                <a href="./index.html">
                    <img id="iconImg" src="developer.png" alt="developer icon">
                    <span id="nameText">Sami Nachwati</span>
                </a>  
            </li>
        </ul>
        <ul id="items">
            <li>
                <a href="about.html">About</a>
            </li>
            <li>
                <a href="projects.html">Projects</a>
            </li>
            <li>
                <a href="resume.html">Resume</a>
            </li>
            <li>
                <a href="contact.html">Contact</a>
            </li>
        </ul>
    </nav>
    <main id="contact">
        <h1>Contact</h1>
        <form action="https://formsubmit.co/saminachwati94@gmail.com" method="POST">
            <div>
                <label>
                    First Name
                </label>
                <input type="text" name="firstname" placeholder="Sami" required>
            </div>
            <div>
                <label>
                    Last Name
                </label>
                <input type="text" name="lastname" placeholder="Nachwati" required>
            </div>
            <div>
                <label>
                    Email
                </label>
                <input type="email" name="email" placeholder="jamesSmith9@hotmail.com" required>
            </div>
            <div>
                <label>
                    Message
                </label>
                <textarea name="message">
                </textarea>
                <input type="hidden" name="_next" value="./confirmpage.html">
            </div>
            <div>
                <input id="submitButton" type="submit" value="Submit">
            </div>
        </form>
        <h1 id="secondHeading">
            Other Contacts
        </h1>
        <figure>
            <a href="https://www.linkedin.com/in/sami-nachwati-519288264/"><img src="linkedin.png" title="LinkedIn" alt="LinkedIn"></a>
            <a href="https://github.com/SamiNachwati"><img src="github.png" title="GitHub" alt="GitHub"></a>
        </figure>
    </main>
</body>
</html>
